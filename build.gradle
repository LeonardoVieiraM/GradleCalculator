│   │       └── Main.java
│   └── test/
│       └── java/calculadora/
│           └── CalculadoraTest.java
├── build.gradle
├── settings.gradle
└── README.md
""".stripIndent()
        
        println "User Guide gerado em: ${userGuideFile.absolutePath}"
    }
}